[custom]
; =========================================================
; ClashMini-lean-v6.ini
; 目标：降低 iStoreOS / OpenClash / Mihomo CPU 压力
; 思路：减少 rule-providers、减少策略组、减少 url-test 组，保留 AI / AppleAI / AppleTV / 流媒体 / 国内直连
; 用法：作为 Sub-Store / subconverter 的远程配置模板使用
; =========================================================

; -------------------------
; 规则集：优先级从高到低
; -------------------------

; 局域网、特殊直连
ruleset=🌐 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🌐 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

; Apple Intelligence 单独分流，不影响普通 Apple 服务
ruleset=🍎 AppleAI,https://raw.githubusercontent.com/seshenli/profile/refs/heads/main/iplist/AppleAI.list

; AI 平台
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/ClaudeAI.list
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Gemini.list
; 可选：Grok 如不用可注释
ruleset=🤖 AI平台,https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Grok.list

; Google / GitHub / Microsoft
ruleset=🔎 Google服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Google/Google.list
ruleset=👨‍💻 GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Bing.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list

; Apple 普通服务默认直连，避免 Apple 全家桶都走代理
ruleset=🍏 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; 流媒体：统一使用美国 / 新加坡 / 台湾 / 香港 / 日本 / AppleTV
ruleset=📺 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎬 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📺 AppleTV,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AppleTV/AppleTV.yaml

; Telegram：只保留香港 / 台湾，如不用可以注释
ruleset=✈️ 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list

; PayPal
ruleset=💳 PayPal,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/PayPal/PayPal.list

; 国外常规代理
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; 国内直连：只保留主干，避免过多国内规则集拖慢
ruleset=🌐 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🌐 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=🌐 全球直连,[]GEOIP,LAN
ruleset=🌐 全球直连,[]GEOIP,CN,no-resolve

; 兜底
ruleset=🐟 漏网之鱼,[]FINAL

; -------------------------
; 策略组：只保留必要分组
; -------------------------

; 主入口：不要挂太多自动组，避免 UI 和内核压力
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🧩 手动切换`[]DIRECT

; 全量自动测速：间隔 1800 秒，避免 300 秒频繁测速吃 CPU
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`1800,,100

; 手动切换：保留全节点兜底
custom_proxy_group=🧩 手动切换`select`.*

; AI 平台：只保留美国自动 / 狮城自动 / 台湾自动
custom_proxy_group=🤖 AI平台`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动

; Apple Intelligence：优先新加坡，其次美国；普通 Apple 不走这里
custom_proxy_group=🍎 AppleAI`select`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动`[]DIRECT

; Google 服务：与 AI 平台一致
custom_proxy_group=🔎 Google服务`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动

; GitHub 与 Google 服务一致；Microsoft 保留香港 / 台湾 / 直连
custom_proxy_group=👨‍💻 GitHub`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动
custom_proxy_group=Ⓜ️ 微软服务`select`[]🇭🇰 香港自动`[]🇹🇼 台湾自动`[]DIRECT

; Apple 普通服务：保留香港 / 台湾 / 直连
custom_proxy_group=🍏 苹果服务`select`[]🇭🇰 香港自动`[]🇹🇼 台湾自动`[]DIRECT

; 流媒体：统一使用美国 / 新加坡 / 台湾 / 香港 / 日本
custom_proxy_group=📺 油管视频`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动
custom_proxy_group=🎬 奈飞视频`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动
custom_proxy_group=📺 AppleTV`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]🇹🇼 台湾自动`[]🇭🇰 香港自动`[]🇯🇵 日本自动

; Telegram：只保留香港 / 台湾
custom_proxy_group=✈️ 电报消息`select`[]🇭🇰 香港自动`[]🇹🇼 台湾自动

; PayPal：只保留美国
custom_proxy_group=💳 PayPal`select`[]🇺🇸 美国自动

; 直连只保留 DIRECT；兜底只保留美国 / 新加坡
custom_proxy_group=🌐 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🇺🇸 美国自动`[]🇸🇬 狮城自动`[]DIRECT

; -------------------------
; 区域自动组：保留美国、新加坡、台湾、香港、日本
; -------------------------

custom_proxy_group=🇺🇸 美国自动`url-test`(美|美国|US|United States|UnitedStates|America|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|达拉斯|硅谷)`http://www.gstatic.com/generate_204`1800,,150
custom_proxy_group=🇸🇬 狮城自动`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`1800,,100
custom_proxy_group=🇹🇼 台湾自动`url-test`(台|台湾|臺灣|TW|Taiwan|台北|高雄|新北|彰化)`http://www.gstatic.com/generate_204`1800,,100
custom_proxy_group=🇭🇰 香港自动`url-test`(港|香港|HK|Hong Kong|HongKong)`http://www.gstatic.com/generate_204`1800,,100
custom_proxy_group=🇯🇵 日本自动`url-test`(日|日本|JP|Japan|东京|大阪|埼玉)`http://www.gstatic.com/generate_204`1800,,100


; -------------------------
; 生成设置
; -------------------------

enable_rule_generator=true
overwrite_original_rules=true
remove_old_emoji=false

; 如需指定基础模板，可取消下一行注释
; clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml
