[custom]
;不要随意改变关键字，否则会导致出错
;针对 MetaCubeX 数据库与 OpenClash 深度优化的 0 冗余版本

; === 1. 外部规则集 (Rule Provider 模式：针对私有列表与特殊分流) ===
; 确保这些非标准标签不会因为数据库缺失而导致内核报错
ruleset=🤖 JetBrains,rule-providers:https://raw.githubusercontent.com/seshenli/profile/refs/heads/main/iplist/Idea.list
ruleset=🤖 AppleAI,rule-providers:https://raw.githubusercontent.com/seshenli/profile/refs/heads/main/iplist/AppleAI.list
ruleset=🧚 GrokAI,rule-providers:https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Grok.list
ruleset=🎬 EMBY,rule-providers:https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Emby.yaml

; === 2. 策略组定义 (保留您全部的精细切换逻辑) ===
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点-自动`[]🇨🇳 台湾节点-自动`[]🇸🇬 狮城节点-自动`[]🇯🇵 日本节点-自动`[]🇺🇲 美国节点-自动`[]🇰🇷 韩国节点-自动`[]🇭🇰 香港节点-手动`[]🇨🇳 台湾节点-手动`[]🇸🇬 狮城节点-手动`[]🇯🇵 日本节点-手动`[]🇺🇲 美国节点-手动`[]🇰🇷 韩国节点-手动`[]🚀 手动切换`[]🏁 其他节点-自动`[]🏁 其他节点-手动`[]🏳️‍🌈特殊倍率节点`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; --- AI 平台独立分流 ---
custom_proxy_group=💬 OpenAi`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点-自动`[]🇸🇬 狮城节点-自动`[]🇯🇵 日本节点-自动`[]🇭🇰 香港节点-手动`[]🚀 手动切换
custom_proxy_group=🤖 Claude`select`[]🚀 节点选择`[]🇺🇲 美国节点-自动`[]🇸🇬 狮城节点-自动`[]🚀 手动切换
custom_proxy_group=🧚 Gemini`select`[]🚀 节点选择`[]🇺🇲 美国节点-自动`[]🇸🇬 狮城节点-自动`[]🚀 手动切换
custom_proxy_group=🤖 JetBrains`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🤖 AppleAI`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🧚 GrokAI`select`[]🚀 节点选择`[]🇺🇲 美国节点-自动`[]🚀 手动切换

; --- 基础通讯与流媒体 ---
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点-自动`[]🇭🇰 香港节点-自动
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🎥 奈飞视频`select`[]🎥 奈飞节点`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🎶 TikTok`select`[]🚀 节点选择`[]🇸🇬 狮城节点-自动`[]🇺🇲 美国节点-自动
custom_proxy_group=🐹 DisneyPlus`select`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=👨‍💻 GitHub`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=📺 哔哩哔哩`select`[]🎯 全球直连`[]🇨🇳 台湾节点-自动`[]🇭🇰 香港节点-自动

; --- 基础大厂与系统 ---
custom_proxy_group=📢 Google服务`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择

; --- 核心底座策略 ---
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🌏 国内媒体`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

; --- 地区自动选择定义 ---
custom_proxy_group=🇭🇰 香港节点-自动`url-test`(港|HK|hk|Hong Kong|🇭🇰)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点-自动`url-test`(日本|东京|大阪|JP|Japan|🇯🇵)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点-自动`url-test`(美|US|United States|America|🇺🇸)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇨🇳 台湾节点-自动`url-test`(台|TW|Taiwan|🇹🇼)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点-自动`url-test`(新加坡|狮城|SG|Singapore|🇸🇬)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点-自动`url-test`(KR|Korea|KOR|首尔|韩|🇰🇷)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点-手动`select`(港|HK|hk|Hong Kong|🇭🇰)
custom_proxy_group=🇯🇵 日本节点-手动`select`(日本|东京|大阪|JP|Japan|🇯🇵)
custom_proxy_group=🇺🇲 美国节点-手动`select`(美|US|United States|America|🇺🇸)
custom_proxy_group=🇨🇳 台湾节点-手动`select`(台|TW|Taiwan|🇹🇼)
custom_proxy_group=🇸🇬 狮城节点-手动`select`(新加坡|狮城|SG|Singapore|🇸🇬)
custom_proxy_group=🇰🇷 韩国节点-手动`select`(KR|Korea|KOR|首尔|韩|🇰🇷)
custom_proxy_group=🏁 其他节点-自动`select`(^(?!.*(?:港|HK|hk|日本|JP|美|US|台|TW|新加坡|SG|KR|韩国)).*$)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🏁 其他节点-手动`select`(^(?!.*(?:港|HK|hk|日本|JP|美|US|台|TW|新加坡|SG|KR|韩国)).*$)
custom_proxy_group=🏳️‍🌈特殊倍率节点`select`(0.5X|0.5x|0.1x|0.1X|1.5X|1.5x|2x|2X|3x|3X|4x|4X|6x|6X|9x|9X)
custom_proxy_group=🎥 奈飞节点`select`(NF|奈飞|解锁|Netflix|Media)`[]🚀 节点选择

enable_rule_generator=true
overwrite_original_rules=true
remove_old_emoji=false

; === 3. 本地数据库规则 (基于 MetaCubeX 数据库标签) ===
[custom_rule]
; 基础净化
GEOSITE,category-ads-all,🛑 广告拦截

; AI 大厂 (Meta 数据库兼容性写法)
GEOSITE,openai,💬 OpenAi
GEOSITE,anthropic,🤖 Claude
GEOSITE,google,🧚 Gemini

; 常用核心
GEOSITE,github,👨‍💻 GitHub
GEOSITE,telegram,📲 电报消息
GEOIP,telegram,📲 电报消息,no-resolve
GEOSITE,google,📢 Google服务
GEOSITE,apple,🍎 苹果服务
GEOSITE,microsoft,Ⓜ️ 微软服务

; 流媒体与游戏
GEOSITE,youtube,📹 油管视频
GEOSITE,netflix,🎥 奈飞视频
GEOSITE,tiktok,🎶 TikTok
GEOSITE,disney,🐹 DisneyPlus
GEOSITE,bilibili,📺 哔哩哔哩
GEOSITE,category-games,🎮 游戏平台

; 国内外分流
GEOSITE,geolocation-!cn,🚀 节点选择
GEOSITE,cn,🎯 全球直连
GEOIP,cn,🎯 全球直连,no-resolve

; 兜底
MATCH,🐟 漏网之鱼
