[custom]
;不要随意改变关键字，否则会导致出错
;为 OpenClash (Meta内核) 优化的极简版规则库
;抛弃 15MB 体积，基于本地 GEOSITE/GEOIP 数据库匹配

; === 1. 基础净化与广告拦截 ===
ruleset=🛑 广告拦截,[]GEOSITE,category-ads-all
; ruleset=🍃 应用净化,[]GEOSITE,privacy

; === 2. AI 服务精细分流 (全部走本地识别，0体积) ===
ruleset=💬 OpenAi,[]GEOSITE,openai
ruleset=🤖 Claude,[]GEOSITE,anthropic
ruleset=🧚 Gemini,[]GEOSITE,gemini
; 自定义极客 AI 规则 (保留外部链接引入)
ruleset=🤖 JetBrains,https://raw.githubusercontent.com/seshenli/profile/refs/heads/main/iplist/Idea.list
ruleset=🤖 AppleAI,https://raw.githubusercontent.com/seshenli/profile/refs/heads/main/iplist/AppleAI.list
ruleset=🧚 GrokAI,https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Grok.list

; === 3. 核心大厂服务 ===
ruleset=📢 谷歌FCM,[]GEOSITE,google-fcm
ruleset=📢 Google服务,[]GEOSITE,google
ruleset=Ⓜ️ 微软Bing,[]GEOSITE,microsoft@cn
ruleset=Ⓜ️ 微软云盘,[]GEOSITE,onedrive
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=👨‍💻 GitHub,[]GEOSITE,github
ruleset=💳 PayPal,[]GEOSITE,paypal

; === 4. 社交与游戏 ===
ruleset=📲 电报消息,[]GEOSITE,telegram
ruleset=📲 电报消息,[]GEOIP,telegram,no-resolve
ruleset=🤖 Discord,[]GEOSITE,discord
ruleset=🎮 游戏平台,[]GEOSITE,category-games@cn
ruleset=🎮 游戏平台,[]GEOSITE,category-games

; === 5. 海量流媒体专属分流 ===
ruleset=📹 油管视频,[]GEOSITE,youtube
ruleset=🎥 奈飞视频,[]GEOSITE,netflix
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🐹 DisneyPlus,[]GEOSITE,disney
ruleset=📽️ PrimeVideo,[]GEOSITE,primevideo
ruleset=🎦 HBO,[]GEOSITE,hbo
ruleset=🍎 AppleTV,[]GEOSITE,appletv
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=📺 巴哈姆特,[]GEOSITE,bahamut
ruleset=📺 哔哩哔哩,[]GEOSITE,bilibili
; Emby 为自定义规则，保留链接
ruleset=🎬 EMBY,https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Emby.yaml

; === 6. 国内外大盘分流与兜底 ===
ruleset=🌏 国内媒体,[]GEOSITE,category-media-cn
ruleset=🌍 国外媒体,[]GEOSITE,geolocation-!cn
ruleset=🚀 节点选择,[]GEOSITE,geolocation-!cn

; 局域网与国内直连
ruleset=🎯 全球直连,[]GEOSITE,category-scholar-cn
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

ruleset=🐟 漏网之鱼,[]FINAL


