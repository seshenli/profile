[custom]
;不要随意改变关键字，否则会导致出错
;针对 MetaCubeX 数据库与 OpenClash 深度优化 (v3 精简候选)
;- 业务组候选: 节点选择 + 自动选择 + 6个地区-自动 (可选 DIRECT)
;- 保留地区手动 / 手动切换 / 其他节点 / 特殊倍率组的定义, 不入业务候选
;- DIRECT 仅用于中国相关组: 哔哩哔哩/Google/Apple/MS/游戏/国内媒体等

